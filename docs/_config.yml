remote_theme: giellalt/jekyll-theme-giellalt@main
title: Dictionary for Skolt Sámi ⇒ multiple languages
description: An electronic dictionary from Skolt Sámi to multiple languages
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jekyll-include-cache
  - jemoji

defaults:
  - scope: { path: "" }
    values:
      layout: minimal
